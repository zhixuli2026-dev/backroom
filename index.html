<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后室 - The Backrooms</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Arial', sans-serif;
    }

    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font-size: 18px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      line-height: 1.6;
    }

    #hud > div {
      margin-bottom: 8px;
    }

    #health {
      font-size: 20px;
    }

    #stamina, #battery {
      font-size: 16px;
    }

    #inventory {
      font-size: 14px;
      max-width: 600px;
    }

    #interaction-hint {
      position: absolute;
      bottom: 150px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 16px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      display: none;
    }

    #game-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 32px;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.9);
      pointer-events: none;
      display: none;
      text-align: center;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 24px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="loading">加载中...</div>
    <div id="ui-overlay">
      <div id="hud">
        <div id="health">生命: ❤️❤️❤️❤️</div>
        <div id="stamina">体力: 100%</div>
        <div id="battery">手电筒: 100% [off]</div>
        <div id="objective">目标：收集碎片 0/1</div>
        <div id="inventory">背包: [1:_] [2:_] [3:_] [4:_] [5:_] [6:_]</div>
        <div id="controls" style="font-size: 12px; color: #aaa; margin-top: 10px;">
          WASD移动 | Shift奔跑 | E交互 | F手电筒 | Q冲刺 | V隐身 | R转身 | X肾上腺素 | 空格闪避
        </div>
      </div>
      <div id="interaction-hint">按 E 键交互</div>
      <div id="game-message"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
